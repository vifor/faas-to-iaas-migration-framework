      summary: Get store inventory
      description: |
        Retrieves the inventory summary for the specified store, including pet availability
        statistics and order counts.
        AVP action: **GetStoreInventory** on resource `MyApplication::Store`.
      operationId: getStoreInventory
      security:
        - BearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          description: Identifier of the store.
          schema:
            type: string
          example: store-001
      responses:
        '200':
          description: Store inventory summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'
              example:
                storeId: store-001
                totalPets: 25
                availablePets: 20
                pendingPets: 3
                soldPets: 2
                totalOrders: 15
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Store not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
